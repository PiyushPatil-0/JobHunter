app:
  name: JobHunter AI
  version: 1.0.0
  environment: development

scheduler:
  # ATS collectors (Greenhouse, Lever, Workday, SmartRecruiters,
  # Ashby) - polled via API, updates frequently.
  ats_interval_minutes: 10

  # Consumer job board collectors (LinkedIn, Naukri) - heavier,
  # rate limited, checked less often.
  job_board_interval_minutes: 60

database:
  path: data/jobs.db
  # Job records and related notification history older than this are removed
  # automatically at the start of each scan.
  job_retention_days: 14

telegram:
  enabled: true

companies:
  include: []

  exclude:
    - TCS
    - Infosys

sources:

  # currenciesdirect: verified live with explicit "India - Mumbai"
  # (Accounts Payable Executive - finance/commerce domain) and
  # "India - Hyderabad" (engineering) roles. Hosted on Greenhouse's
  # EU domain, not the global one - see eu_companies below and
  # app/collectors/greenhouse.py.
  #
  # capco: financial/banking consultancy, 191 live postings,
  # heavily India - Pune weighted (.NET, React, Java Fullstack,
  # Power BI, Hadoop, Fund Accounting BA, Solution Architect) plus
  # India - Bengaluru roles. Standard (global) Greenhouse host.
  greenhouse:
    enabled: true
    companies:
      - capco
    eu_companies:
      - currenciesdirect

  # These boards have current India openings (Mumbai, Delhi,
  # Ahmedabad, Bangalore, and hybrid/remote India roles).
  lever:
    enabled: true
    companies:
      - aleph
      - dnb
      - applydigital
      - employ
      - pattern
      - entrata
      - hevodata
      - weloglobal

  # India-focused Ashby boards, including Bangalore and Pune roles.
  # Aspora (formerly Vance) - fintech/remittance for the Indian
  # diaspora, India-headquartered - verified live on Ashby.
  ashby:
    enabled: true
    companies:
      - almabase
      - uptimeai
      - gainsight
      - aiprise
      - ripplestreet
      - skylo
      - Aspora

  # careers.smartrecruiters.com/aristanetworks - verified live
  # with open postings.
  smartrecruiters:
    enabled: true
    companies:
      - aristanetworks

  # Workday has no simple company slug - each tenant's host/site
  # combination is unique to that company's career site. Read
  # these three values off the company's own Workday careers URL,
  # e.g. https://acme.wd5.myworkdayjobs.com/en-US/External ->
  #   host: acme.wd5.myworkdayjobs.com
  #   tenant: acme
  #   site: External
  #
  # Both tenants below verified live with open postings.
  #
  # visa: global payments company (payments = commerce domain),
  # confirmed large India engineering presence (Glassdoor shows
  # India-specific salary bands for Senior/Staff Software Engineer
  # roles; a secondary SmartRecruiters page also exists for Visa but
  # their primary career site is this Workday tenant).
  workday:
    enabled: true
    tenants:
      - host: baincapital.wd1.myworkdayjobs.com
        tenant: baincapital
        site: External_Public
      - host: nvidia.wd5.myworkdayjobs.com
        tenant: nvidia
        site: NVIDIAExternalCareerSite
      - host: visa.wd5.myworkdayjobs.com
        tenant: visa
        site: Visa

  # Both job board sources are unofficial scrapers of public
  # search endpoints (see app/collectors/linkedin.py and
  # naukri.py for details). Left disabled - review the relevant
  # Terms of Service before flipping enabled: true, since these
  # are a different risk profile than the official ATS APIs above.

  linkedin:
    enabled: false
    max_pages: 2

  naukri:
    enabled: false
    max_pages: 2

  # Pluggable across Adzuna / Careerjet / Jooble - see
  # app/collectors/job_aggregator.py for the reasoning on why these
  # three (not LinkedIn/Naukri/Darwinbox/Wellfound - all ruled out
  # this session for ToS or active bot-detection reasons).
  #
  # 1. Pick a provider, register for API access, and confirm their
  #    current terms yourself (Adzuna's have a real caveat - see the
  #    collector's docstring).
  # 2. Set provider below to "adzuna", "careerjet", or "jooble".
  # 3. Put credentials in .env as AGGREGATOR_API_KEY /
  #    AGGREGATOR_API_SECRET (see .env.example) - never here.
  # 4. Flip enabled to true.
  aggregator:
    enabled: false
    provider: ""
    country: in
